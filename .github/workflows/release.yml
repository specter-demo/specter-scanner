name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run tests
        run: go test ./... -v -timeout 60s

      - name: Build all targets
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}" make build-all

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign linux-amd64 binary
        run: |
          cosign sign-blob \
            --yes \
            --output-signature dist/specter-scanner-linux-amd64.sig \
            dist/specter-scanner-linux-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/specter-scanner-linux-amd64
            dist/specter-scanner-linux-amd64.sig
            dist/specter-scanner-linux-arm64
            dist/specter-scanner-darwin-amd64
            dist/specter-scanner-darwin-arm64
            dist/specter-scanner-windows-amd64.exe
          generate_release_notes: true
